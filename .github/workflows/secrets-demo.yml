name: Demo Secrets

on:
  push:
    branches: [main]

jobs:
  demo:
    runs-on: ubuntu-latest

    # Variables de entorno disponibles para TODOS los steps
    env:
      ENVIRONMENT: staging          # Variable pública
      

    steps:          
      - uses: actions/checkout@v4

      - name: 📋 Mostrar variables de entorno
        run: |
          echo "Desplegando en staging..."
         
      - name: 🔑 Usar secret en un comando
        run: |
          # Así usarías un token para autenticarte en una API
          echo "Llamando API con token..."
          curl -s -o /dev/null -w "HTTP %{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            https://httpbin.org/bearer || true